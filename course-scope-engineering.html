<style>
:root{
  --bg:#FAF8F3; --surface:#FFFFFF; --surface2:#F2EFE8; --surface3:#E8E4DA;
  --border:#E0DBD0; --border2:#C9C3B5;
  --text:#1C1A14; --text2:#4A4640; --text3:#948E84;
  --brand:#D4580A; --brand-dk:#A83E00; --brand-bg:#FFF3E8; --brand-border:#F2C4A0;
  --accent:#0A7B72; --accent-dk:#065750; --accent-bg:#E6F7F6; --accent-border:#9FD9D5;
  --blue:#1A4DD6; --blue-bg:#EBF0FF; --green:#0D6640; --green-bg:#E8F8EF;
  --amber:#855100; --amber-bg:#FFF5E0; --purple:#581F9E; --purple-bg:#F2EBFF;
  --coral:#BC2D12; --coral-bg:#FFEDE8; --teal:#0A686F; --teal-bg:#E5FAFB;
  --rose:#9B1B5A; --rose-bg:#FFEBF3;
  --r:10px; --r-lg:16px; --r-xl:22px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.04);
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Plus Jakarta Sans',sans-serif;
  --font-tamil:'Noto Sans Tamil',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:0 16px 64px}
.review-flag{background:#2A2620;color:#F4EFE6;text-align:center;font-size:11.5px;letter-spacing:.03em;padding:7px 12px;font-weight:600}
.review-flag b{color:#F4A66A}

/* two-level nav: stream → course */
.navwrap{position:sticky;top:0;z-index:20;background:rgba(250,248,243,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
.streamrow{max-width:560px;margin:0 auto;display:flex;gap:8px;overflow-x:auto;padding:9px 16px 2px;scrollbar-width:none}
.streamrow::-webkit-scrollbar{display:none}
.courserow-wrap{position:relative;max-width:560px;margin:0 auto}
.courserow-wrap::before{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to left,transparent,rgba(250,248,243,.96));pointer-events:none;transition:opacity .3s;opacity:0;z-index:1}
.courserow-wrap::after{content:'';position:absolute;right:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,transparent,rgba(250,248,243,.96));pointer-events:none;transition:opacity .3s;z-index:1}
.courserow-wrap.has-left::before{opacity:1}
.courserow-wrap.at-end::after{opacity:0}
.courserow{display:flex;gap:8px;overflow-x:auto;padding:8px 16px 9px;scrollbar-width:none}
.courserow::-webkit-scrollbar{display:none}
.scroll-hint{position:absolute;top:50%;transform:translateY(-50%);background:var(--surface);border:1.5px solid var(--border2);border-radius:999px;width:28px;height:28px;display:grid;place-items:center;font-size:13px;color:var(--text2);cursor:pointer;box-shadow:var(--shadow-sm);transition:opacity .3s;z-index:2;opacity:0;pointer-events:none}
.scroll-hint.right{right:4px}
.scroll-hint.left{left:4px}
.courserow-wrap.has-left .scroll-hint.left{opacity:1;pointer-events:auto}
.courserow-wrap.has-overflow:not(.at-end) .scroll-hint.right{opacity:1;pointer-events:auto}
.schip{flex:none;border:none;background:transparent;color:var(--text3);font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;padding:5px 3px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.schip.on{color:var(--brand-dk);border-bottom-color:var(--brand)}
.ctab{flex:none;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);font-family:var(--font-body);font-weight:600;font-size:13px;padding:7px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;min-height:36px}
.ctab.on{background:var(--brand);border-color:var(--brand);color:#fff}

/* ── LEVEL 1 ── */
.hero{padding:22px 2px 4px}
.hero .eyebrow{font-size:11px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--brand-dk)}
.hero h1{font-family:var(--font-display);font-size:clamp(24px,7vw,30px);font-weight:700;line-height:1.12;margin:7px 0 9px}
.hero .essence{font-size:16px;color:var(--text);font-weight:500;line-height:1.45}

.block{margin-top:22px}
.block-h{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:11px}

.understand{list-style:none;display:flex;flex-direction:column;gap:9px}
.understand li{position:relative;padding-left:29px;font-size:15.5px;color:var(--text);line-height:1.4;font-weight:500}
.understand li::before{content:'✅';position:absolute;left:0;top:0;font-size:15px}

.usedin{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.usedin .u{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:13px 8px 11px;text-align:center;box-shadow:var(--shadow-sm)}
.usedin .u .ico{font-size:23px;line-height:1}
.usedin .u .lbl{font-size:12px;font-weight:600;color:var(--text2);margin-top:6px;line-height:1.2}

.opps{display:flex;flex-direction:column;gap:10px}
details.opp{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm)}
details.opp[open]{border-color:var(--border2)}
.opp summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;padding:14px 15px;min-height:60px;-webkit-tap-highlight-color:transparent}
.opp summary::-webkit-details-marker{display:none}
.opp .oic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:21px;flex:none}
.opp .omain{flex:1;min-width:0}
.opp .oname{font-size:15.5px;font-weight:700;color:var(--text);display:block}
.opp .oteaser{font-size:12.5px;color:var(--text3);display:block;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.opp .ochev{flex:none;color:var(--text3);font-size:12px;transition:transform .2s}
.opp[open] .ochev{transform:rotate(180deg)}
.opp[open] .oteaser{display:none}
.obody{padding:2px 15px 16px}
.ochips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:13px}
.ochips span{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 11px;font-size:13px;font-weight:600;color:var(--text)}
.osub{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.oroutes{display:flex;flex-wrap:wrap;gap:6px}
.oroutes span{font-size:12.5px;color:var(--text2);background:transparent;border:1px dashed var(--border2);border-radius:7px;padding:4px 9px}
.o-gov .oic{background:var(--blue-bg);color:var(--blue)}
.o-pri .oic{background:var(--purple-bg);color:var(--purple)}
.o-res .oic{background:var(--coral-bg);color:var(--coral)}
.o-ent .oic{background:var(--green-bg);color:var(--green)}

details.exp{border-top:1px solid var(--border)}
details.exp summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:9px;padding:16px 2px;font-size:14.5px;font-weight:700;color:var(--text);min-height:54px}
details.exp summary::-webkit-details-marker{display:none}
details.exp .echev{margin-left:auto;color:var(--text3);font-size:12px;transition:transform .2s}
details.exp[open] .echev{transform:rotate(180deg)}
.expbody{padding:0 2px 18px}
.pills{display:flex;flex-wrap:wrap;gap:7px}
.pills span{background:var(--amber-bg);border:1px solid #F0D69B;color:var(--amber);font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:999px}
.hslist{list-style:none;display:flex;flex-direction:column;gap:8px}
.hslist li{position:relative;padding-left:18px;font-size:14px;color:var(--text2)}
.hslist li::before{content:'→';position:absolute;left:0;color:var(--accent);font-weight:700}
.exp-wrap{margin-top:24px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2px 16px;box-shadow:var(--shadow-sm)}
.exp-wrap details.exp:first-child{border-top:none}

.foot{margin-top:26px;text-align:center;padding:20px 16px;background:var(--brand-bg);border:1px solid var(--brand-border);border-radius:16px}
.foot p{font-size:13.5px;color:var(--text2);margin-bottom:11px}
.foot a{display:inline-block;background:var(--brand);color:#fff;text-decoration:none;font-weight:700;font-size:13.5px;padding:10px 22px;border-radius:999px}
.tinyfoot{text-align:center;font-size:11.5px;color:var(--text3);margin-top:22px}
@media(max-width:360px){.usedin{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

/* ── RENDER (unchanged — same engine for every stream) ───────────────────── */
function oppHTML(o){
  const teaser=o.items.slice(0,3).join(' · ')+(o.items.length>3?' …':'');
  const chips=o.items.map(i=>`<span>${i}</span>`).join('');
  const routes=o.sub.map(s=>`<span>${s}</span>`).join('');
  return `<details class="opp o-${o.k}">
    <summary><span class="oic">${o.ic}</span>
      <span class="omain"><span class="oname">${o.name}</span><span class="oteaser">${teaser}</span></span>
      <span class="ochev">▼</span></summary>
    <div class="obody"><div class="ochips">${chips}</div>
      <div class="osub">${o.subLabel}</div><div class="oroutes">${routes}</div></div></details>`;
}
function render(b){
  document.getElementById('app').innerHTML = `
  <div class="hero"><div class="eyebrow">${b.emoji} Course Scope · ${b.stream}</div>
    <h1>${b.title}</h1><p class="essence">${b.essence}</p></div>
  <div class="block"><div class="block-h">📘 What you'll understand</div>
    <ul class="understand">${b.understand.map(u=>`<li>${u}</li>`).join('')}</ul></div>
  <div class="block"><div class="block-h">📍 Where it's used</div>
    <div class="usedin">${b.usedin.map(u=>`<div class="u"><div class="ico">${u[0]}</div><div class="lbl">${u[1]}</div></div>`).join('')}</div></div>
  <div class="block"><div class="block-h">🚪 Opportunities — tap to explore</div>
    <div class="opps">${b.opps.map(oppHTML).join('')}</div></div>
  <div class="exp-wrap">
    <details class="exp"><summary>📈 Industry trends<span class="echev">▼</span></summary>
      <div class="expbody"><div class="pills">${b.trends.map(t=>`<span>${t}</span>`).join('')}</div></div></details>
    <details class="exp"><summary>🎓 Higher studies<span class="echev">▼</span></summary>
      <div class="expbody"><ul class="hslist">${b.higher.map(h=>`<li>${h}</li>`).join('')}</ul></div></details>
  </div>
  <div class="foot"><p>Have a question about ${b.tab}? Ask Vazhi.</p><a href="#">Talk to Vazhi →</a></div>`;
  window.scrollTo({top:0,behavior:'instant'});
}

/* ── TWO-LEVEL NAV: stream → course (derived from data) ──────────────────── */
const streamrow=document.getElementById('streamrow');
const courserow=document.getElementById('courserow');
const cr=courserow;
const wrap=document.getElementById('crwrap');

function checkScroll(){
  const hasOverflow=cr.scrollWidth>cr.clientWidth+4;
  const atStart=cr.scrollLeft<=4;
  const atEnd=!hasOverflow||cr.scrollLeft+cr.clientWidth>=cr.scrollWidth-4;
  wrap.classList.toggle('has-overflow',hasOverflow);
  wrap.classList.toggle('has-left',hasOverflow&&!atStart);
  wrap.classList.toggle('at-end',atEnd);
}
cr.addEventListener('scroll',checkScroll,{passive:true});
document.getElementById('scrollright').addEventListener('click',()=>cr.scrollBy({left:120,behavior:'smooth'}));
document.getElementById('scrollleft').addEventListener('click',()=>cr.scrollBy({left:-120,behavior:'smooth'}));

const STREAM_ORDER=['Commerce','Engineering','Medical'];
const STREAMS=STREAM_ORDER.filter(s=>COURSES.some(c=>c.stream===s));
let curStream=STREAMS[0], curCourse=null;
function paint(){
  streamrow.innerHTML=STREAMS.map(s=>`<button class="schip${s===curStream?' on':''}" data-s="${s}">${s}</button>`).join('');
  const list=COURSES.filter(c=>c.stream===curStream);
  if(!list.includes(curCourse)) curCourse=list[0];
  courserow.innerHTML=list.map(c=>`<button class="ctab${c.id===curCourse.id?' on':''}" data-id="${c.id}">${c.emoji} ${c.tab}</button>`).join('');
  streamrow.querySelectorAll('.schip').forEach(b=>b.onclick=()=>{curStream=b.dataset.s;curCourse=null;paint();});
  courserow.querySelectorAll('.ctab').forEach(b=>b.onclick=()=>{curCourse=list.find(c=>c.id===b.dataset.id);paint();});
  render(curCourse);
  cr.scrollLeft=0;
  requestAnimationFrame(()=>requestAnimationFrame(checkScroll));
}
paint();
</script>
</body>
